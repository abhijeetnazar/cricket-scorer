name: cricket-scorer

services:
  # ── Development (hot-reload) ──────────────────────────────────────────────
  dev:
    image: node:20-alpine
    profiles: [dev]
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules        # anonymous volume keeps container modules separate
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host"
    environment:
      - NODE_ENV=development

  # ── Production (nginx) ────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    profiles: [prod]
    ports:
      - "8080:80"
    restart: unless-stopped
