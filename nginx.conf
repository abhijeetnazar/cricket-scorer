server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /cricket-scorer/ {
        try_files $uri $uri/ /cricket-scorer/index.html;
    }

    # Redirect root to the app
    location = / {
        return 301 /cricket-scorer/;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
